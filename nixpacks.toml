[versions]
php = "8.2"
node = "20"

[phases.setup]
nixPkgs = ["php82", "php82Extensions.pgsql", "php82Extensions.pdo", "php82Extensions.mbstring", "php82Extensions.gd", "php82Extensions.curl", "php82Extensions.openssl", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.zip", "nodejs_20", "npm"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci", "npm run build"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force && php artisan storage:link; php -S 0.0.0.0:$PORT -t public"
